<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>IELTS Synonym Trainer</title>
<style>
:root {
  --bg:#09111f;
  --bg2:#0f1b31;
  --panel:rgba(18,28,48,.72);
  --panel-2:rgba(255,255,255,.06);
  --text:#ecf3ff;
  --muted:#9fb3d1;
  --accent:#7c9cff;
  --accent-2:#5de1c6;
  --danger:#ff7f8a;
  --good:#61e6a3;
  --shadow:0 20px 60px rgba(0,0,0,.35);
  --radius:24px;
}
* {box-sizing:border-box;}
html,body {margin:0; min-height:100%; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:
radial-gradient(circle at 20% 0%, rgba(124,156,255,.18), transparent 30%),
radial-gradient(circle at 90% 10%, rgba(93,225,198,.14), transparent 25%),
linear-gradient(180deg, var(--bg), var(--bg2));
color:var(--text);}
body {padding:18px;}
.app {max-width:1320px; margin:0 auto; display:grid; gap:16px;}
.glass {background:var(--panel); backdrop-filter: blur(18px); border:1px solid rgba(255,255,255,.08); box-shadow: var(--shadow); border-radius:var(--radius);}
.header {padding:22px 24px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; position:sticky; top:12px; z-index:10;}
.brand h1 {margin:0; font-size:clamp(26px,4vw,40px); letter-spacing:.02em;}
.brand p {margin:8px 0 0; color:var(--muted); max-width:760px; line-height:1.5;}
.badge, .pill {display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 12px; font-size:13px; border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.05); color:var(--text);}
.controls {display:flex; flex-wrap:wrap; align-items:center; gap:10px;}
button, select, input, textarea {
  font: inherit; color:var(--text); background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:12px 14px;
  transition:.24s transform, .24s background, .24s border-color, .24s box-shadow;
}
input::placeholder, textarea::placeholder {color:#7d90af;}
button {cursor:pointer;}
button:hover, select:hover, input:hover, textarea:hover {transform:translateY(-1px); border-color:rgba(124,156,255,.45);}
button.primary {background:linear-gradient(135deg, var(--accent), #9f7bff); border:none; box-shadow:0 12px 30px rgba(124,156,255,.24);}
button.secondary {background:linear-gradient(135deg, rgba(93,225,198,.18), rgba(93,225,198,.04));}
button.ghost {background:rgba(255,255,255,.04);}
button.danger {background:linear-gradient(135deg, rgba(255,127,138,.25), rgba(255,127,138,.08)); border-color:rgba(255,127,138,.35);}
.grid-3 {display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
.grid-main {display:grid; grid-template-columns: 340px 1fr; gap:16px;}
.card {padding:18px; position:relative; overflow:hidden;}
.card::before {content:""; position:absolute; inset:auto -20% 100% auto; width:180px; height:180px; background:radial-gradient(circle, rgba(124,156,255,.15), transparent 65%); filter:blur(18px);}
.stat .label {font-size:13px; color:var(--muted);}
.stat .value {margin-top:10px; font-size:clamp(24px,3.6vw,38px); font-weight:700;}
.tabs {display:flex; gap:10px; flex-wrap:wrap;}
.tab.active, .option.active {background:linear-gradient(135deg, rgba(124,156,255,.26), rgba(124,156,255,.06)); border-color:rgba(124,156,255,.45);}
.sidebar {padding:18px; display:grid; gap:14px; align-content:start;}
.section-title {font-size:15px; font-weight:700; letter-spacing:.02em;}
.progress {height:10px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.08);}
.progress > div {height:100%; border-radius:999px; background:linear-gradient(90deg, var(--accent), var(--accent-2)); width:0%; transition:width .35s ease;}
.content {padding:18px; min-height:68vh; display:grid; gap:16px;}
.hidden {display:none !important;}
.question-card {padding:22px; border-radius:22px; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border:1px solid rgba(255,255,255,.08); animation:rise .35s ease;}
@keyframes rise {from {opacity:0; transform:translateY(10px) scale(.985)} to {opacity:1; transform:none}}
.source-strip {display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.prompt {font-size:clamp(28px,4vw,42px); font-weight:800; letter-spacing:.01em; margin:8px 0 0;}
.subtext {color:var(--muted); margin-top:10px; line-height:1.5;}
.options {display:grid; gap:12px; margin-top:16px;}
.option {padding:16px; text-align:left; border-radius:18px; background:rgba(255,255,255,.04);}
.option.correct {border-color:rgba(97,230,163,.55); background:rgba(97,230,163,.14);}
.option.wrong {border-color:rgba(255,127,138,.55); background:rgba(255,127,138,.12); animation:shake .26s linear;}
@keyframes shake {25%{transform:translateX(4px)} 50%{transform:translateX(-3px)} 75%{transform:translateX(3px)}}
.feedback {padding:14px 16px; border-radius:18px; line-height:1.55;}
.feedback.good {background:rgba(97,230,163,.12); border:1px solid rgba(97,230,163,.45);}
.feedback.bad {background:rgba(255,127,138,.12); border:1px solid rgba(255,127,138,.45);}
.small {font-size:13px; color:var(--muted);}
.kbd {padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.08);}
.topline {display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;}
.countdown {font-weight:700; color:#dce7ff;}
.library-list {max-height:58vh; overflow:auto; display:grid; gap:10px; padding-right:4px;}
.library-item {padding:14px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);}
.library-item h4 {margin:0 0 8px; font-size:16px;}
.library-item p {margin:0; line-height:1.5; color:#dce7ff;}
.form-grid {display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
.form-grid .full {grid-column:1/-1;}
textarea {min-height:120px; resize:vertical;}
.searchbar {width:100%;}
.inline {display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.notice {padding:12px 14px; border-radius:18px; background:rgba(124,156,255,.12); border:1px solid rgba(124,156,255,.3); color:#dce7ff;}
.footer-note {text-align:center; color:#7890b2; font-size:12px; padding:10px 0 30px;}
@media (max-width: 1050px) {
  .grid-main {grid-template-columns:1fr;}
  .grid-3 {grid-template-columns:1fr;}
}
@media (max-width: 640px) {
  body {padding:12px;}
  .header,.content,.sidebar,.card {padding:16px;}
  .form-grid {grid-template-columns:1fr;}
}
</style>
</head>

</div>

const state = {
  lang: 'zh-CN',
  module: 'all',
  view: 'dashboard',
  mode: 'match',
  relation: 'all',
  optionCount: 4,
  taskCount: 20,
  currentQuestion: null,
  customEntries: [],
  stats: {answered:0, correct:0, todayDone:0},
  sessionMap: {},
  progressMap: {},
  dailyContext: false,
  search: '',
};

function loadLocal() {
  try {
    Object.assign(state, JSON.parse(localStorage.getItem(STORAGE_KEYS.settings) || '{}'));
    state.customEntries = JSON.parse(localStorage.getItem(STORAGE_KEYS.custom) || '[]');
    state.stats = Object.assign(state.stats, JSON.parse(localStorage.getItem(STORAGE_KEYS.stats) || '{}'));
    state.sessionMap = JSON.parse(localStorage.getItem(STORAGE_KEYS.sessions) || '{}');
    state.progressMap = JSON.parse(localStorage.getItem(STORAGE_KEYS.progress) || '{}');
  } catch(e) {}
  if (!['zh-CN','zh-TW','en-GB'].includes(state.lang)) state.lang='zh-CN';
  state.taskCount = Math.max(5, Number(state.taskCount) || 20);
}

function saveLocal() {
  localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify({lang:state.lang,module:state.module,view:state.view,mode:state.mode,relation:state.relation,optionCount:state.optionCount,taskCount:state.taskCount,search:state.search,dailyContext:state.dailyContext}));
  localStorage.setItem(STORAGE_KEYS.custom, JSON.stringify(state.customEntries));
  localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(state.stats));
  localStorage.setItem(STORAGE_KEYS.sessions, JSON.stringify(state.sessionMap));
  localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(state.progressMap));
}

function t(key, ...args) {
  const val = I18N[state.lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function allEntries() {
  return [...BASE_ENTRIES, ...state.customEntries];
}

function filteredEntries() {
  return allEntries().filter(e => {
    const moduleOk = state.module === 'all' || e.module === state.module;
    const relationOk = state.relation === 'all' || e.relationType === state.relation;
    const searchBlob = `${e.prompt} ${e.answer} ${e.sourceTag} ${e.dayTag} ${e.section}`;
    const searchOk = !state.search || searchBlob.toLowerCase().includes(state.search.toLowerCase());
    return moduleOk && relationOk && searchOk;
  });
}

function entriesForModule(module) {
  return allEntries().filter(e => module === 'all' || e.module === module);
}

function currentTaskCap(module = state.module) {
  return Math.max(5, entriesForModule(module).length || 5);
}

function normalizeTaskCount(input, module = state.module) {
  const raw = Math.max(5, Number(input) || 20);
  const capped = Math.min(raw, currentTaskCap(module));
  return Math.max(5, Math.round(capped / 5) * 5);
}

function currentScopeKey() {
  return state.module || 'all';
}

function getCurrentSession() {
  return state.sessionMap[currentScopeKey()] || null;
}

function ensureProgressScope(scopeKey) {
  const ids = entriesForModule(scopeKey).map(e => e.id);
  const existing = state.progressMap[scopeKey];
  if (!existing || !Array.isArray(existing.order)) {
    state.progressMap[scopeKey] = { order: shuffle(ids), cursor: 0 };
    return state.progressMap[scopeKey];
  }
  const seen = new Set(existing.order);
  const missing = ids.filter(id => !seen.has(id));
  if (missing.length) existing.order.push(...shuffle(missing));
  existing.order = existing.order.filter(id => ids.includes(id));
  if (existing.cursor > existing.order.length) existing.cursor = 0;
  state.progressMap[scopeKey] = existing;
  return existing;
}

function resetProgressScope(scopeKey) {
  const ids = entriesForModule(scopeKey).map(e => e.id);
  state.progressMap[scopeKey] = { order: shuffle(ids), cursor: 0 };
  state.sessionMap[scopeKey] = null;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function seedRandom(seedStr) {
  let h = 2166136261;
  for (let i=0;i<seedStr.length;i++) {
    h ^= seedStr.charCodeAt(i);
    h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);
  }
  return function() {
    h += 0x6D2B79F5;
    let t = Math.imul(h ^ h >>> 15, 1 | h);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function pickDailySet(forceNew=false) {
  const scopeKey = currentScopeKey();
  const existing = state.sessionMap[scopeKey];
  if (!forceNew && existing && existing.tasks && existing.answered < existing.tasks.length && existing.taskCount === normalizeTaskCount(state.taskCount, scopeKey)) return existing;
  const entries = entriesForModule(scopeKey);
  if (!entries.length) {
    state.sessionMap[scopeKey] = { scopeKey, tasks: [], index: 0, correct: 0, answered: 0 };
    return state.sessionMap[scopeKey];
  }
  const progress = ensureProgressScope(scopeKey);
  const taskCount = Math.min(normalizeTaskCount(state.taskCount, scopeKey), entries.length);
  const selectedIds = [];
  while (selectedIds.length < taskCount) {
    if (!progress.order.length) break;
    if (progress.cursor >= progress.order.length) {
      progress.cursor = 0;
      progress.order = shuffle(progress.order);
    }
    selectedIds.push(progress.order[progress.cursor]);
    progress.cursor += 1;
  }
  const matchCount = Math.max(1, Math.ceil(taskCount * 0.6));
  const selected = selectedIds.map((id, idx) => ({
    type: idx < matchCount ? 'match' : 'judge',
    id
  }));
  state.sessionMap[scopeKey] = { scopeKey, tasks: selected, index: 0, correct: 0, answered: 0, taskCount };
  saveLocal();
  return state.sessionMap[scopeKey];
}

function createMatchQuestion(baseEntry) {
  const pool = filteredEntries().filter(e => e.id !== baseEntry.id && e.relationType === baseEntry.relationType && e.module === baseEntry.module);
  const distractors = shuffle(pool).slice(0, Math.max(3, state.optionCount - 1)).map(e => e.answer);
  const options = shuffle([baseEntry.answer, ...distractors]).slice(0, state.optionCount);
  return { kind:'match', baseEntry, options, correct: baseEntry.answer };
}

function createJudgeQuestion(baseEntry) {
  const makeTrue = Math.random() > 0.45;
  let candidate = baseEntry.answer;
  let isTrue = true;
  if (!makeTrue) {
    const pool = filteredEntries().filter(e => e.id !== baseEntry.id && e.module === baseEntry.module && e.answer !== baseEntry.answer);
    if (pool.length) {
      candidate = shuffle(pool)[0].answer;
      isTrue = false;
    }
  }
  return { kind:'judge', baseEntry, candidate, correct: isTrue };
}

function nextQuestion(fromDaily=false) {
  const pool = filteredEntries();
  if (!pool.length) {
    state.currentQuestion = null;
    render();
    return;
  }
  let baseEntry;
  let mode = state.mode;
  state.dailyContext = !!fromDaily;
  if (fromDaily) {
    const daily = pickDailySet();
    if (!daily.tasks.length || daily.index >= daily.tasks.length) {
      state.currentQuestion = null;
      saveLocal();
      render();
      return;
    }
    const task = daily.tasks[daily.index];
    const found = allEntries().find(e => e.id === task.id);
    baseEntry = found || pool[0];
    mode = task.type;
  } else {
    baseEntry = shuffle(pool)[0];
  }
  state.currentQuestion = mode === 'match' ? createMatchQuestion(baseEntry) : createJudgeQuestion(baseEntry);
  saveLocal();
  render();
}

function answerQuestion(correct) {
  state.stats.answered += 1;
  if (correct) state.stats.correct += 1;
  const fb = document.getElementById('feedbackBox');
  if (state.currentQuestion.kind === 'match') {
    fb.className = 'feedback ' + (correct ? 'good' : 'bad');
    fb.innerHTML = correct
      ? `<strong>${t('right')}</strong><br>${t('correctPair')}：${state.currentQuestion.correct}`
      : `<strong>${t('wrong')}</strong><br>${t('answerReveal')}：${state.currentQuestion.correct}`;
  } else {
    fb.className = 'feedback ' + (correct ? 'good' : 'bad');
    fb.innerHTML = correct
      ? `<strong>${t('right')}</strong><br>${state.currentQuestion.correct ? t('isTrue') : t('isFalse')}`
      : `<strong>${t('wrong')}</strong><br>${state.currentQuestion.correct ? t('isTrue') : t('isFalse')}`;
  }
  fb.classList.remove('hidden');
  const session = getCurrentSession();
  if (session && state.view === 'practice' && isDailyContext()) {
    session.answered += 1;
    if (correct) session.correct += 1;
    session.index = Math.min(session.index + 1, session.tasks.length);
    state.sessionMap[currentScopeKey()] = session;
    state.stats.todayDone = session.answered;
  }
  saveLocal();
  updateStats();
}

function isDailyContext() {
  return state.dailyContext === true;
}

function updateStats() {
  const entries = entriesForModule(state.module).length;
  const daily = pickDailySet();
  const acc = state.stats.answered ? Math.round(state.stats.correct / state.stats.answered * 100) : 0;
  document.getElementById('statEntriesLabel').textContent = t('entries');
  document.getElementById('statEntries').textContent = entries;
  document.getElementById('statTodayLabel').textContent = t('todayDone');
  document.getElementById('statToday').textContent = t('statDoneFormat', daily.answered || 0, daily.tasks.length || 0);
  document.getElementById('statAccuracyLabel').textContent = t('accuracy');
  document.getElementById('statAccuracy').textContent = t('statAccFormat', acc);
  document.getElementById('todayProgressBar').style.width = `${daily.tasks.length ? (daily.answered / daily.tasks.length) * 100 : 0}%`;
  document.getElementById('todayProgressText').textContent = t('taskSummary', daily.answered || 0, daily.tasks.length || 0);
  document.getElementById('taskAmountHint').textContent = `${t('sourceCountHint', entries)} · ${t('taskAmountHint')}`;
}

    wrap.innerHTML = `

        <div class="source-strip">${sourceBadge(e)}</div>

      </div>`;
    wrap.querySelector('#judgeYes').onclick = ()=> answerQuestion(q.correct === true);
    wrap.querySelector('#judgeNo').onclick = ()=> answerQuestion(q.correct === false);

      id: 'custom-' + Date.now(),
      module: document.getElementById('customModule').value,
      sourceTag: document.getElementById('customSourceTag').value.trim() || t('customSource'),
      dayTag: '',
      section: 'CUSTOM',
      prompt,
      answer,
      page: 0,
      relationType: document.getElementById('customRelation').value
    });
    saveLocal(); render();
  };
  document.getElementById('clearCustomBtn').onclick = ()=> {
    document.getElementById('customPrompt').value = '';
    document.getElementById('customAnswer').value = '';
    document.getElementById('customSourceTag').value = '';
  };
  document.querySelectorAll('[data-del]').forEach(btn => btn.onclick = () => {
    state.customEntries = state.customEntries.filter(x => x.id !== btn.dataset.del);
    saveLocal(); render();
  });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function render() {
  renderStaticText();
  renderSelectors();
  updateStats();

  document.getElementById('dashboardView').classList.toggle('hidden', state.view !== 'dashboard');
  document.getElementById('practiceView').classList.toggle('hidden', state.view !== 'practice');
  document.getElementById('libraryView').classList.toggle('hidden', state.view !== 'library');
  document.getElementById('customView').classList.toggle('hidden', state.view !== 'custom');

  if (state.view === 'dashboard') renderDashboard();
  if (state.view === 'practice') renderPractice();
  if (state.view === 'library') renderLibrary();
  if (state.view === 'custom') renderCustom();

  bindStaticEvents();
  saveLocal();
}

function bindStaticEvents() {
  document.getElementById('langSelect').onchange = e => { state.lang = e.target.value; render(); };
  document.getElementById('moduleSelect').onchange = e => {
    state.module = e.target.value;
    state.taskCount = normalizeTaskCount(state.taskCount, state.module);
    state.currentQuestion = null;
    state.dailyContext = false;
    render();
  };
  document.querySelectorAll('[data-view]').forEach(btn => btn.onclick = () => {
    state.view = btn.dataset.view;
    if (state.view !== 'practice') state.dailyContext = false;
    render();
  });
  document.querySelectorAll('[data-mode]').forEach(btn => btn.onclick = () => {
    state.mode = btn.dataset.mode;
    state.dailyContext = false;
    nextQuestion(false);
  });
  document.querySelectorAll('[data-relation]').forEach(btn => btn.onclick = () => {
    state.relation = btn.dataset.relation;
    render();
  });
  document.getElementById('searchInput').oninput = e => {
    state.search = e.target.value;
    render();
  };
  document.getElementById('searchInput').value = state.search || '';
  const taskRange = document.getElementById('taskAmountRange');
  const taskNumber = document.getElementById('taskAmountNumber');
  const maxTasks = currentTaskCap(state.module);
  taskRange.max = maxTasks;
  taskNumber.max = maxTasks;
  taskRange.value = normalizeTaskCount(state.taskCount, state.module);
  taskNumber.value = normalizeTaskCount(state.taskCount, state.module);
  const syncTaskAmount = val => {
    state.taskCount = normalizeTaskCount(val, state.module);
    state.sessionMap[currentScopeKey()] = null;
    state.currentQuestion = null;
    state.dailyContext = false;
    render();
  };
  taskRange.oninput = e => {
    taskNumber.value = normalizeTaskCount(e.target.value, state.module);
  };
  taskRange.onchange = e => syncTaskAmount(e.target.value);
  taskNumber.onchange = e => syncTaskAmount(e.target.value);
  document.getElementById('newQuestionBtn').onclick = () => {
    nextQuestion(isDailyContext());
  };
  document.getElementById('resetTodayBtn').onclick = () => {
    resetProgressScope(currentScopeKey());
    pickDailySet(true);
    state.dailyContext = false;
    render();
  };
  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state.customEntries, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'synonym-custom-bank.json'; a.click();
    URL.revokeObjectURL(url);
  };
  document.getElementById('importInput').onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      if (!Array.isArray(parsed)) throw new Error('bad');
      state.customEntries = parsed;
      alert(t('importOk'));
      render();
    } catch(err) {
      alert(t('importFail'));
    }
  };
}

loadLocal();
pickDailySet();
if (state.view === 'practice') {
  nextQuestion(!!state.dailyContext);
} else {
  state.currentQuestion = null;
  render();
}
</script>
</body>
</html>
